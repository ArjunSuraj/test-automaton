<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      color: #333;
    }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 32px; }
    #main-btn {
      background: linear-gradient(to right, #0066ff, #dc2626);
      color: white;
      border: none;
      padding: 16px 48px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    #main-btn:hover { transform: scale(1.05); }
    footer { position: fixed; bottom: 16px; color: #aaa; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Test Application</h1>
  <p>A simple test app for the automaton UI developer agent.</p>
  <button id="main-btn">Click Me</button>
  <footer>ArjunSuraj/test-automaton</footer>
</body>
</html>
